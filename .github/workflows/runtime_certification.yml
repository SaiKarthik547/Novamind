name: NovaMind Runtime Certification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  certify-runtime:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Deterministic Validation Suite
      run: |
        pytest tests/test_core.py tests/test_split_brain_recovery.py -v

    - name: Run Phase 7 Concurrency & Replay Tests
      run: |
        pytest tests/test_async_concurrency.py tests/test_replay_equivalence.py -v

    - name: Run Phase 9/11 Kernel Tests
      run: |
        pytest tests/test_worker_crash_recovery.py tests/test_job_object_enforcement.py tests/test_capability_escape.py tests/test_ipc_watchdogs.py tests/test_legacy_wal_fallback.py tests/test_partial_segment_recovery.py tests/test_wal_hash_chain.py tests/test_wal_segmentation.py -v

    - name: Run Phase 12 Telemetry & Observability Tests
      run: |
        pytest tests/test_telemetry_ordering.py tests/test_adapter_lifecycle.py tests/test_intent_dispatcher.py tests/test_godot_bridge.py tests/test_intent_contracts.py -v

    - name: Run Phase 13 Capabilities Tests
      run: |
        pytest tests/test_process_adapter.py tests/test_filesystem_adapter.py -v

    - name: Run Schema Validator
      run: |
        python tools/replay_validator.py --ci-mode
