name: NovaMind Runtime Certification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  certify-runtime:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio websockets numexpr

    - name: Run Deterministic Validation Suite
      run: |
        pytest tests/test_core.py tests/test_chaos_injector.py tests/test_split_brain_recovery.py -v

    - name: Run Schema Validator
      run: |
        python tools/replay_validator.py --ci-mode
